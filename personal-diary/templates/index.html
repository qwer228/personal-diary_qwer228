{% extends "base.html" %}
{% block content %}
<h2>Мои записи</h2>
{% if entries %}
    {% for entry in entries %}
    <div class="entry-card">
        <h3>{{ entry.title }}</h3>
        <p class="date">{{ entry.date }}</p>
        <a href="/entry/{{ entry.id }}" class="btn btn-primary">Читать</a>
        <form method="POST" action="/delete/{{ entry.id }}" style="display:inline;">
            <button type="submit" class="btn btn-danger">Удалить</button>
        </form>
    </div>
    {% endfor %}
{% else %}
    <p>Пока нет записей. Создайте первую!</p>
{% endif %}
{% endblock %}
