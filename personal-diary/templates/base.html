<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный дневник</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Личный дневник</h1>
        <nav>
            <a href="/">Главная</a>
            <a href="/add">Новая запись</a>
        </nav>
        <form class="search-form" method="GET" action="/search">
            <input type="text" name="q" placeholder="Поиск по заголовку...">
            <button type="submit" class="btn btn-secondary">Найти</button>
        </form>
        <a href="/filter/week" class="btn btn-secondary">За неделю</a>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        &copy; 2026 Личный дневник. Разработано на Flask.
    </footer>
</body>
</html>
