{% extends "base.html" %}
{% block content %}
<h2>Новая запись</h2>
<form method="POST">
    <label>Заголовок</label>
    <input type="text" name="title" required>
    <label>Текст</label>
    <textarea name="content" rows="10" required></textarea>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="/" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
